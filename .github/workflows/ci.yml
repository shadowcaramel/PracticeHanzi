name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      # svglib → rlpycairo → pycairo; PyPI often only has a sdist, which needs libcairo to build.
      - name: Install Cairo build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt "pytest>=8"
          python -m pip check

      - name: Run pytest
        run: python -m pytest -q
